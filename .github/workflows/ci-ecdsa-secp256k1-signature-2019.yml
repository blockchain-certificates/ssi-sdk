name: CI - ecdsa-secp256k1-signature-2019

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/ecdsa-secp256k1-signature-2019/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ecdsa-secp256k1-signature-2019
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/ecdsa-secp256k1-signature-2019/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
