name: Release - ecdsa-secp256k1-verification-key-2019

on:
  push:
    branches:
      - main
    paths:
      - 'packages/ecdsa-secp256k1-verification-key-2019/**'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/ecdsa-secp256k1-verification-key-2019/package-lock.json
      - name: Install dependencies
        working-directory: packages/ecdsa-secp256k1-verification-key-2019
        run: npm ci
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          working_directory: packages/ecdsa-secp256k1-verification-key-2019
